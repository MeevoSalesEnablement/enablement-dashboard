h+='<div class="tbl-wrap"><table><thead><tr><th>Rep</th><th style="text-align:right" data-sort="total">Reviewed'+(si==="total"?" "+arrow:"")+'</th><th style="text-align:right" data-sort="avg">Avg'+(si==="avg"?" "+arrow:"")+'</th><th style="text-align:center">Excellent</th><th style="text-align:center">Needs Work</th><th style="text-align:center">Trend</th><th style="text-align:right" data-sort="opps">Opps'+(si==="opps"?" "+arrow:"")+'</th></tr></thead><tbody>';
reps.forEach(function(r){h+='<tr data-rep="'+r.id+'"><td><div class="name-cell">'+av(r.name,30)+'<div style="font-weight:600;font-size:13px;color:#2d3e4e">'+r.name+'</div></div></td><td style="text-align:right;font-weight:600">'+r.total+'</td><td style="text-align:right"><span class="badge" style="color:'+sc(r.avg)+';background:'+scBg(r.avg)+'">'+r.avg+'</span></td><td style="text-align:center;color:#1a6b54;font-weight:500">'+(r.excellent>0?r.excellent+" ("+pct(r.excellent,r.total)+"%)":"—")+'</td><td style="text-align:center;color:#c45a3b;font-weight:500">'+(r.needsWork>0?r.needsWork+" ("+pct(r.needsWork,r.total)+"%)":"—")+'</td><td style="text-align:center">'+spark(r.trend)+'</td><td style="text-align:right;font-weight:500">'+r.opps+'</td></tr>'});
h+='</tbody></table></div>';return h}
function renderCoaching(){var h='<div class="filter-row"><button class="filter-btn'+(selRep===null?" active":"")+'" data-rep="all">All Reps</button>';REPS.forEach(function(r){h+='<button class="filter-btn'+(selRep===r.id?" active":"")+'" data-rep="'+r.id+'">'+r.name.split(" ")[0]+'</button>'});h+='</div>';
var list=selRep?REPS.filter(function(r){return r.id===selRep}):REPS;
list.forEach(function(r){h+='<div class="rep-card"><div class="rep-header">'+av(r.name,36)+'<div style="flex:1"><div class="rep-name">'+r.name+'</div><div class="rep-sub">'+r.total+' calls · Avg: '+r.avg+' · '+r.trendLabel+'</div></div><div class="rep-score" style="color:'+sc(r.avg)+'">'+r.avg+'</div></div>';
h+='<div class="rep-stats">';[{l:"Excellent",v:r.excellent,c:"#1a6b54"},{l:"Good",v:r.good,c:"#3b82c4"},{l:"Needs Work",v:r.needsWork,c:"#c45a3b"}].forEach(function(b){h+='<div class="rep-stat" style="background:'+(b.v>0?b.c+"11":"#f8fafb")+'"><div class="rep-stat-val" style="color:'+(b.v>0?b.c:"#cdd5de")+'">'+(b.v>0?b.v:"—")+'</div><div class="rep-stat-label">'+b.l+(b.v>0?" ("+pct(b.v,r.total)+"%)":"")+'</div></div>'});h+='</div>';
h+='<div class="tag-section"><div class="tag-title">Key Themes</div><div class="tags">';r.themes.forEach(function(t){h+='<span class="tag tag-theme">'+t+'</span>'});h+='</div></div>';
h+='<div class="tag-section"><div class="tag-title">Coaching Actions</div><div class="tags">';r.actions.forEach(function(a){h+='<span class="tag tag-action">'+a+'</span>'});h+='</div></div>';
if(selRep){h+='<div style="margin-top:16px"><div class="tag-title">Score Trend (Jan–Apr)</div><div class="bar-chart">';r.trend.forEach(function(v,i){h+='<div class="bar-col">';if(v!==null){h+='<div class="bar-fill-v" style="height:'+Math.max((v-2)*120,8)+'px;background:'+sc(v)+'"></div><div class="bar-val" style="color:'+sc(v)+'">'+v+'</div>'}else{h+='<div style="font-size:10px;color:#cdd5de;padding-bottom:18px">—</div>'}h+='<div class="bar-lbl">'+MO[i]+'</div></div>'});h+='</div></div>'}
h+='</div>'});return h}
function renderSkills(){var h='<div class="section-title" style="color:#c45a3b">Critical Gaps (Avg < 2.0)</div><div class="section-sub">Urgent coaching needed — these competencies are holding the team back</div>';
COMPS.filter(function(c){return c.type==="gap"}).forEach(function(c,i){h+='<div class="comp-card" data-comp="'+i+'"><div class="comp-row"><div style="flex:1"><div class="comp-name">'+c.name+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+((c.avg/5)*100)+'%;background:'+sc(c.avg)+'"></div></div></div><div class="comp-score" style="color:'+sc(c.avg)+'">'+c.avg+'</div></div><div class="comp-detail" id="comp-gap-'+i+'" style="background:#fdf2f0;color:#7a3322">'+c.detail+'</div></div>'});
h+='<div class="section-title" style="color:#1a6b54;margin-top:32px">Team Strengths (Avg > 3.0)</div><div class="section-sub">Leverage these for peer coaching and best practice sharing</div>';
COMPS.filter(function(c){return c.type==="strength"}).forEach(function(c,i){h+='<div class="comp-card" data-comp-s="'+i+'"><div class="comp-row"><div style="flex:1"><div class="comp-name">'+c.name+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+((c.avg/5)*100)+'%;background:'+sc(c.avg)+'"></div></div></div><div class="comp-score" style="color:'+sc(c.avg)+'">'+c.avg+'</div></div><div class="comp-detail" id="comp-str-'+i+'" style="background:#e8f5f0;color:#14533e">'+c.detail+'</div></div>'});
h+='<div class="section-title" style="margin-top:32px">Individual Top 3 Gaps</div><div class="gap-grid">';
REPS.forEach(function(r){h+='<div class="gap-card"><div class="gap-card-header">'+av(r.name,24)+'<span style="font-weight:600;font-size:13px;color:#2d3e4e">'+r.name+'</span></div>';r.gaps.forEach(function(g,i){h+='<div class="gap-item'+(g.includes("Limited")?" limited":"")+'">'+(i+1)+'. '+g+'</div>'});h+='</div>'});h+='</div>';return h}
function renderTrends(){var h='<div class="section-title">Monthly Team Performance</div><div class="section-sub" style="margin-bottom:18px">February was the team\'s best month. March saw regression. April is recovering.</div><div class="monthly-row">';
MONTHLY.forEach(function(m){h+='<div class="mo-card" style="text-align:center;padding:18px"><div class="mo-label">'+m.month+'</div><div style="font-size:32px;font-weight:700;color:'+sc(m.avg)+';margin-top:4px">'+m.avg+'</div><div style="display:flex;justify-content:center;gap:16px;margin-top:10px"><div><span style="font-size:16px;font-weight:700;color:#1a6b54">'+m.strong+'%</span><div style="font-size:9px;color:#94a3b8">Strong ≥3.0</div></div><div><span style="font-size:16px;font-weight:700;color:#c45a3b">'+m.weak+'%</span><div style="font-size:9px;color:#94a3b8">Weak <2.0</div></div></div></div>'});h+='</div>';
h+='<div class="section-title" style="color:#1a6b54;margin-top:8px">Improving Reps</div><div class="section-sub">Coaching is working — positive trajectory</div>';
REPS.filter(function(r){return r.trendLabel==="Strong ↑"||r.trendLabel==="Improving"}).forEach(function(r){h+='<div class="trend-row">'+av(r.name,32)+'<div style="flex:1"><div style="font-weight:600;font-size:13px;color:#2d3e4e">'+r.name+'</div><div style="font-size:11px;color:#1a6b54">'+r.trendLabel+'</div></div>'+spark(r.trend,120,32)+'<div style="font-size:16px;font-weight:700;color:'+sc(r.avg)+'">'+r.avg+'</div></div>'});
h+='<div class="section-title" style="color:#c45a3b;margin-top:28px">Watch List</div><div class="section-sub">Showing regression or inconsistency — monitor closely</div>';
REPS.filter(function(r){return r.trendLabel==="Recovering"}).forEach(function(r){h+='<div class="trend-row warn">'+av(r.name,32)+'<div style="flex:1"><div style="font-weight:600;font-size:13px;color:#2d3e4e">'+r.name+'</div><div style="font-size:11px;color:#c45a3b">'+r.trendLabel+' — needs attention</div></div>'+spark(r.trend,120,32)+'<div style="font-size:16px;font-weight:700;color:'+sc(r.avg)+'">'+r.avg+'</div></div>'});
h+='<div class="section-title" style="color:#7a8fa0;margin-top:28px">Stable Performers</div><div class="section-sub">Consistent — maintain current coaching cadence</div>';
REPS.filter(function(r){return r.trendLabel==="Rock Solid"||r.trendLabel==="Stable"}).forEach(function(r){h+='<div class="trend-row" style="padding:12px 18px">'+av(r.name,28)+'<div style="flex:1"><div style="font-weight:500;font-size:13px;color:#3d4f5f">'+r.name+'</div></div>'+spark(r.trend,80,24)+'<div style="font-size:14px;font-weight:700;color:'+sc(r.avg)+'">'+r.avg+'</div></div>'});
h+='<div class="section-title" style="margin-top:28px">All Reps — Trend Sparklines</div><div class="trend-grid">';
REPS.forEach(function(r){h+='<div class="trend-mini">'+av(r.name,24)+'<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:#3d4f5f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</div><div style="font-size:10px;color:#94a3b8">'+r.trendLabel+'</div></div>'+spark(r.trend,60,20)+'<span style="font-size:12px;font-weight:700;color:'+sc(r.avg)+'">'+r.avg+'</span></div>'});h+='</div>';return h}
function renderDeals(){var sorted=[].concat(REPS).sort(function(a,b){return b.opps-a.opps});
var h='<div class="cov-banner"><div class="cov-pct">100%</div><div class="cov-title">Coaching Coverage Achieved</div><div style="font-size:12px;color:#5a7a6a;margin-top:6px">Every rep has 0 uncoached opportunities — all deals with calls reviewed and scored</div></div>';
h+='<div class="section-title">Deal Coaching Leaderboard</div><div class="section-sub" style="margin-bottom:14px">Ranked by unique opportunities coached</div>';
h+='<div class="tbl-wrap"><table><thead><tr><th style="width:30px">#</th><th>Rep</th><th style="text-align:right">Opps</th><th style="text-align:right">Calls</th><th style="text-align:right">Calls/Opp</th><th style="text-align:center">Coverage</th></tr></thead><tbody>';
sorted.forEach(function(r,i){h+='<tr><td style="color:#94a3b8;font-weight:500">'+(i+1)+'</td><td><div class="name-cell">'+av(r.name,26)+'<span style="font-weight:600;font-size:13px;color:#2d3e4e">'+r.name+'</span></div></td><td style="text-align:right;font-weight:600">'+r.opps+'</td><td style="text-align:right">'+r.calls+'</td><td style="text-align:right;font-weight:500">'+(r.calls/r.opps).toFixed(1)+'</td><td style="text-align:center"><span style="background:#e8f5f0;color:#1a6b54;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:600">100%</span></td></tr>'});
h+='</tbody></table></div>';
var ht=[].concat(REPS).sort(function(a,b){return(b.calls/b.opps)-(a.calls/a.opps)}).slice(0,5);
h+='<div class="ht-box"><h3>High-Touch Reps (Most calls per opportunity)</h3>';
ht.forEach(function(r){var ratio=(r.calls/r.opps).toFixed(1);h+='<div class="ht-row">'+av(r.name,28)+'<div style="flex:1;font-size:13px;font-weight:500;color:#3d4f5f">'+r.name+'</div><div style="width:80px"><div class="bar-bg"><div class="bar-fill" style="width:'+((r.calls/r.opps)/2.5*100)+'%;background:#1a6b54"></div></div></div><div style="font-size:16px;font-weight:700;color:#1a6b54;min-width:40px;text-align:right">'+ratio+'</div><div style="font-size:10px;color:#94a3b8">calls/opp</div></div>'});
h+='</div>';return h}
function render(){renderTabs();var m=document.getElementById("main");if(currentTab==="Overview")m.innerHTML=renderOverview();else if(currentTab==="Call Coaching")m.innerHTML=renderCoaching();else if(currentTab==="Skills & Gaps")m.innerHTML=renderSkills();else if(currentTab==="Trends")m.innerHTML=renderTrends();else if(currentTab==="Deal Coverage")m.innerHTML=renderDeals();bindEvents()}
function bindEvents(){var si=document.getElementById("repSearch");if(si){si.oninput=function(){searchVal=this.value;render();setTimeout(function(){var el=document.getElementById("repSearch");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)}}
document.querySelectorAll("th[data-sort]").forEach(function(th){th.onclick=function(){var k=this.dataset.sort;if(sortKey===k)sortDir=sortDir==="desc"?"asc":"desc";else{sortKey=k;sortDir="desc"}render()}});
document.querySelectorAll("tr[data-rep]").forEach(function(tr){tr.onclick=function(){selRep=parseInt(this.dataset.rep);currentTab="Call Coaching";render()}});
document.querySelectorAll(".filter-btn").forEach(function(b){b.onclick=function(){selRep=this.dataset.rep==="all"?null:parseInt(this.dataset.rep);render()}});
document.querySelectorAll(".comp-card[data-comp]").forEach(function(c){c.onclick=function(){var d=document.getElementById("comp-gap-"+this.dataset.comp);if(d)d.classList.toggle("open")}});
document.querySelectorAll(".comp-card[data-comp-s]").forEach(function(c){c.onclick=function(){var d=document.getElementById("comp-str-"+this.dataset.compS);if(d)d.classList.toggle("open")}})}
render();
</script>
</body>
</html>
